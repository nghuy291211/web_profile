<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Cá Nhân</title>
    <style>
        /* Thiết lập chung */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Khung chứa hiệu ứng kính mờ */
        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            color: white;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        /* Ảnh đại diện */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 4px solid rgba(255,255,255,0.3);
            object-fit: cover;
            background-color: #ddd;
        }
        h1 { margin: 10px 0; font-size: 24px; }
        p { opacity: 0.8; margin-bottom: 30px; }
        
        /* Nút bấm */
        .btn {
            display: block;
            margin: 15px 0;
            padding: 15px;
            background: white;
            color: #764ba2;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #f0f0f0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Thay link ảnh của bạn vào src bên dưới -->
        <img src="https://github.com/nghuy291211/web_profile/blob/96adf28fb4323a397364257b4a4f55b901d0ed8c/file_0000000072ac722f8af5dffff5cd0c65.png" alt="Avatar" class="avatar">
        
        <h1>Nguyễn Văn Thịnh</h1>
        <p>Developer & Tech Enthusiast</p>

        <a href="https://facebook.com" class="btn">Facebook</a>
        <a href="https://instagram.com" class="btn">Instagram</a>
        <a href="https://github.com" class="btn">GitHub</a>
    </div>

</body>
</html>
